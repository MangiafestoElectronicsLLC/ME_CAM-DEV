<!doctype html>
<html>

<head>
    <title>ME Camera - Customer Account</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .setup-container {
            max-width: 480px;
            margin: 60px auto;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .setup-container h1 {
            color: #2979ff;
            margin-bottom: 10px;
            text-align: center;
        }

        .setup-container p {
            color: #999;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #e0e0e0;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: #0f0f0f;
            border: 1px solid #444;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 16px;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2979ff;
            background: #1a1a1a;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2979ff, #1565c0);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #1565c0, #0d47a1);
        }

        .error {
            background: #3d2d2d;
            border: 1px solid #d32f2f;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="brand">📹 ME Camera</div>
    </div>

    <div class="setup-container">
        <h1>👤 Create Customer Account</h1>
        <p>This creates the permanent customer login and removes the temporary admin account.</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Customer Username</label>
                <input type="text" name="customer_username" placeholder="e.g., customer" required>
            </div>
            <div class="form-group">
                <label>Customer Password (min 8 chars)</label>
                <input type="password" name="customer_password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="customer_password_confirm" required>
            </div>
            <button class="btn-primary" type="submit">Create Customer Account</button>
        </form>
    </div>
</body>

</html>
