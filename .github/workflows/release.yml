name: CI and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint critical Python files
        run: |
          flake8 src/core web/app_lite.py tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/core web/app_lite.py tests --count --max-line-length=120 --statistics

      - name: Compile Python
        run: |
          python -m compileall src web tests

      - name: Run security-focused tests
        run: |
          pytest -q tests

  release_hygiene:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Block local-only artifact patterns
        run: |
          test ! -d wheel_tmp
          test ! -d _installer_extracted
          test ! -d venv
          test ! -d .venv
          test -z "$(find . -maxdepth 1 -type f -name '_*.py' -print -quit)"
          test -z "$(find . -maxdepth 1 -type f -name '*_results.json' -print -quit)"

      - name: Scan source for obvious secrets
        run: |
          if grep -RInE 'Kidcudi|Kiducdi|DEVICE_TOKEN=|password\s*=\s*["\x27][^"\x27]+' src web scripts tests --include='*.py' --include='*.sh' --include='*.ps1'; then
            echo 'Potential secret or lab credential detected in tracked source.'
            exit 1
          fi

      - name: Check core documentation exists
        run: |
          test -f README.md
          test -f SECURITY.md
          test -f docs/GITHUB_INSTALL.md
          test -f docs/REPLIT_INSTALL.md

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [quality, release_hygiene]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ME_CAM v3 release.

            Included in this release:
            - Updated documentation for GitHub and Replit deployment paths
            - Security-focused test coverage for auth, CSRF, headers, and rate limiting
            - Stricter release hygiene checks to prevent shipping local lab artifacts
